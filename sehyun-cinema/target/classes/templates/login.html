<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로그인 - 세현시네마</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .login-page { min-height:100vh; display:flex; align-items:stretch; }

    /* 왼쪽 시네마 배경 */
    .login-left {
      flex:1; position:relative; overflow:hidden;
      background:linear-gradient(160deg,#0a0a1a 0%,#12122a 40%,#1a0a0a 100%);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:60px 48px;
    }
    .login-left::before {
      content:'';
      position:absolute; inset:0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 30%, rgba(228,180,0,.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(180,60,60,.1) 0%, transparent 60%);
    }
    .film-strip {
      position:absolute; top:-10%; right:-40px; width:120px; height:130%; min-height:400px;
      opacity:.06;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.25) 0 72px,
        transparent 72px 88px
      );
      border-radius:4px;
    }

    .login-brand { position:relative; text-align:center; z-index:2; }
    .login-brand-logo { font-size:2.4rem; font-weight:900; letter-spacing:6px; color:var(--gold); line-height:1; }
    .login-brand-sub { font-size:.75rem; letter-spacing:4px; color:rgba(228,180,0,.6); margin-top:4px; }
    .login-brand-desc { margin-top:32px; color:rgba(255,255,255,.6); font-size:.88rem; line-height:1.8; }

    /* 등급 배지들 */
    .grade-badges { display:flex; gap:12px; margin-top:36px; position:relative; z-index:2; flex-wrap:wrap; justify-content:center; }
    .grade-badge {
      padding:8px 16px; border-radius:20px; font-size:.75rem; font-weight:700;
      display:flex; align-items:center; gap:6px;
    }
    .gb-vip   { background:rgba(90,60,16,.6); color:#f0c060; border:1px solid rgba(240,192,96,.3); }
    .gb-vvip  { background:rgba(58,40,96,.6); color:var(--gold); border:1px solid rgba(228,180,0,.3); }
    .gb-lvip  { background:rgba(30,20,0,.7); color:#ffe066; border:2px solid rgba(228,180,0,.5);
                box-shadow:0 0 16px rgba(228,180,0,.2); }

    /* 오른쪽 폼 */
    .login-right {
      width:460px; flex-shrink:0; background:#0b0b1e;
      display:flex; align-items:center; justify-content:center; padding:60px 40px;
      border-left:1px solid rgba(255,255,255,.06);
    }
    .login-form-wrap { width:100%; }
    .login-form-title { font-size:1.4rem; font-weight:900; color:var(--text-primary); margin-bottom:6px; }
    .login-form-subtitle { font-size:.82rem; color:var(--text-muted); margin-bottom:32px; }

    .input-wrap { position:relative; margin-bottom:14px; }
    .input-wrap i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:.88rem; }
    .input-wrap input {
      width:100%; padding:13px 14px 13px 40px;
      background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1);
      border-radius:10px; color:var(--text-primary); font-size:.9rem; outline:none;
      transition:all .2s;
    }
    .input-wrap input:focus { border-color:var(--gold); background:rgba(228,180,0,.04); box-shadow:0 0 0 3px rgba(228,180,0,.1); }
    .input-wrap input::placeholder { color:rgba(255,255,255,.2); }

    .btn-login-main {
      width:100%; padding:14px; margin-top:8px;
      background:linear-gradient(135deg,#e4b400,#f5c800); border:none; border-radius:10px;
      color:#000; font-weight:900; font-size:.95rem; cursor:pointer;
      transition:all .25s; letter-spacing:.5px;
    }
    .btn-login-main:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(228,180,0,.4); }

    .divider { display:flex; align-items:center; gap:12px; margin:24px 0; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,.07); }
    .divider span { font-size:.75rem; color:var(--text-muted); white-space:nowrap; }

    .social-btns { display:flex; flex-direction:column; gap:10px; }
    .btn-social {
      display:flex; align-items:center; justify-content:center; gap:10px;
      padding:12px 16px; border-radius:10px; font-weight:700; font-size:.85rem;
      text-decoration:none; border:none; cursor:pointer; transition:all .2s;
    }
    .btn-kakao  { background:#FEE500; color:#191919; }
    .btn-kakao:hover  { background:#fdd800; color:#191919; transform:translateY(-1px); }
    .btn-google { background:#fff; color:#333; border:1px solid #e0e0e0; }
    .btn-google:hover { background:#f5f5f5; color:#333; transform:translateY(-1px); }
    .btn-naver  { background:#03C75A; color:#fff; opacity:.55; cursor:not-allowed; }

    .login-links { display:flex; justify-content:center; gap:20px; margin-top:20px; font-size:.78rem; }
    .login-links a { color:var(--text-muted); text-decoration:none; transition:color .2s; }
    .login-links a:hover { color:var(--gold); }

    @media (max-width:768px) {
      .login-left { display:none; }
      .login-right { width:100%; padding:40px 24px; }
    }
  </style>
</head>
<body style="margin:0; background:#0b0b1e;">

<div class="login-page">
  <!-- 왼쪽: 시네마 브랜딩 -->
  <div class="login-left">
    <!-- 필름 스트립 장식 -->
    <div class="film-strip" aria-hidden="true"></div>

    <div class="login-brand">
      <div class="login-brand-logo">SEHYUN</div>
      <div class="login-brand-logo" style="font-size:1.4rem; letter-spacing:8px; color:rgba(228,180,0,.7);">CINEMA</div>
      <div class="login-brand-sub">PREMIUM MOVIE EXPERIENCE</div>
      <p class="login-brand-desc">
        최신 2026 박스오피스 영화를<br>
        세현시네마에서 먼저 만나보세요.<br>
        IMAX · 4DX · 수퍼플렉스 · 리클라이너
      </p>
    </div>

    <div class="grade-badges">
      <div class="grade-badge gb-vip"><i class="fa-solid fa-crown"></i> VIP</div>
      <div class="grade-badge gb-vvip"><i class="fa-solid fa-crown"></i> VVIP</div>
      <div class="grade-badge gb-lvip"><i class="fa-solid fa-crown"></i> LVIP</div>
    </div>

    <!-- 현재상영 미리보기 포스터 -->
    <div style="margin-top:48px; display:flex; gap:10px; opacity:.7; position:relative; z-index:2;">
      <img src="https://image.tmdb.org/t/p/w500/zEH1FQTEnRY05i8gQIYdR10Vp92.jpg" style="width:60px; height:86px; object-fit:cover; border-radius:6px; box-shadow:0 4px 16px rgba(0,0,0,.5);" onerror="this.style.display='none'"/>
      <img src="https://image.tmdb.org/t/p/w500/qqGpVVZk2KD1lAvccgTU4Z6nh1H.jpg" style="width:60px; height:86px; object-fit:cover; border-radius:6px; box-shadow:0 4px 16px rgba(0,0,0,.5);" onerror="this.style.display='none'"/>
      <img src="/images/posters/pamyo.png" style="width:60px; height:86px; object-fit:cover; border-radius:6px; box-shadow:0 4px 16px rgba(0,0,0,.5);" onerror="this.style.display='none'"/>
      <img src="https://image.tmdb.org/t/p/w500/uFJFPvbFijg4uUFdGxgcGVHvhY7.jpg" style="width:60px; height:86px; object-fit:cover; border-radius:6px; box-shadow:0 4px 16px rgba(0,0,0,.5);" onerror="this.style.display='none'"/>
      <img src="https://image.tmdb.org/t/p/w500/7IiTTgloJzvGI1TAYymCfbfl3vT.jpg" style="width:60px; height:86px; object-fit:cover; border-radius:6px; box-shadow:0 4px 16px rgba(0,0,0,.5);" onerror="this.style.display='none'"/>
    </div>
    <p style="color:rgba(255,255,255,.3); font-size:.72rem; margin-top:10px; position:relative; z-index:2; letter-spacing:1px;">지금 상영 중인 영화</p>
  </div>

  <!-- 오른쪽: 로그인 폼 -->
  <div class="login-right">
    <div class="login-form-wrap">
      <a href="/" style="display:flex; align-items:center; gap:8px; text-decoration:none; margin-bottom:36px;">
        <i class="fa-solid fa-arrow-left" style="color:var(--text-muted); font-size:.85rem;"></i>
        <span style="color:var(--text-muted); font-size:.82rem;">홈으로</span>
      </a>

      <p class="login-form-title">로그인</p>
      <p class="login-form-subtitle">세현시네마 계정으로 로그인하세요</p>

      <!-- 알림 -->
      <div th:if="${loginError}" style="background:rgba(244,67,54,.1); border:1px solid rgba(244,67,54,.3); border-radius:8px; padding:12px 16px; margin-bottom:16px; font-size:.84rem; color:#ef5350;">
        <i class="fa-solid fa-circle-exclamation" style="margin-right:6px;"></i>
        <span th:text="${loginError}"></span>
      </div>
      <div th:if="${success}" style="background:rgba(76,175,80,.1); border:1px solid rgba(76,175,80,.3); border-radius:8px; padding:12px 16px; margin-bottom:16px; font-size:.84rem; color:#66bb6a;">
        <i class="fa-solid fa-circle-check" style="margin-right:6px;"></i>
        <span th:text="${success}"></span>
      </div>

      <form action="/login" method="post">
        <th:block th:replace="~{fragments/csrf-field :: csrfField}"></th:block>
        <div class="input-wrap">
          <i class="fa-solid fa-user"></i>
          <input type="text" name="username" placeholder="아이디" required autocomplete="username"/>
        </div>
        <div class="input-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" name="password" placeholder="비밀번호" required autocomplete="current-password"/>
        </div>
        <button type="submit" class="btn-login-main">
          <i class="fa-solid fa-right-to-bracket" style="margin-right:8px;"></i>로그인
        </button>
      </form>

      <div class="login-links">
        <a href="/join">회원가입</a>
        <span style="color:rgba(255,255,255,.1);">|</span>
        <a href="#">아이디 찾기</a>
        <span style="color:rgba(255,255,255,.1);">|</span>
        <a href="#">비밀번호 찾기</a>
      </div>

      <th:block th:if="${oauth2Enabled}">
        <div class="divider"><span>또는 소셜 로그인</span></div>
        <div class="social-btns">
          <a href="/oauth2/authorization/kakao" class="btn-social btn-kakao">
            <img src="https://k.kakaocdn.net/14/dn/btroDszwNrM/I6efHub1SN5KCJqLm1Ovx1/o.jpg" style="height:20px; border-radius:2px;" alt=""/>
            카카오로 로그인
          </a>
          <a href="#" onclick="alert('Google Console에서 Client ID 발급 후 활성화됩니다.'); return false;" class="btn-social btn-google">
            <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            구글로 로그인
          </a>
          <button type="button" class="btn-social btn-naver" style="opacity:.45;">
            <span style="font-weight:900; font-size:1rem; line-height:1;">N</span>
            네이버로 로그인 (준비중)
          </button>
        </div>
      </th:block>

      <p style="text-align:center; margin-top:28px; font-size:.78rem; color:rgba(255,255,255,.2);">
        &copy; 2026 SEHYUN CINEMA. All rights reserved.
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
