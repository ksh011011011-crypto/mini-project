<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('예매 내역')}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="page-mypage" style="padding:50px 0 80px; color:#e8e8f0;">
  <div class="container-xl" style="max-width:860px;">
    <div style="display:flex; align-items:center; gap:16px; margin-bottom:28px;">
      <a th:href="@{/mypage}" style="color:var(--text-muted);"><i class="fa-solid fa-arrow-left"></i></a>
      <h1 style="font-size:1.4rem; font-weight:800; color:var(--text-primary);">예매 내역</h1>
    </div>

    <div th:if="${bookings.empty}" style="text-align:center; padding:60px; color:var(--text-muted);">
      <i class="fa-solid fa-ticket" style="font-size:3rem; opacity:.2; display:block; margin-bottom:12px;"></i>
      예매 내역이 없습니다.
      <div style="margin-top:16px;"><a th:href="@{/booking}" class="btn-hero-primary" style="padding:10px 28px;">영화 예매하기</a></div>
    </div>

    <div th:each="b : ${bookings}"
         style="background:var(--bg-card); border-radius:12px; border:1px solid rgba(255,255,255,.06); padding:24px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:16px;">
      <div style="display:flex; gap:16px; align-items:flex-start; flex:1; min-width:0;">
        <img th:src="${b.movie.posterUrl != null and !b.movie.posterUrl.isEmpty()} ? ${b.movie.posterUrl} : 'https://image.tmdb.org/t/p/w500/7IiTTgloJzvGI1TAYymCfbfl3vT.jpg'"
             th:alt="${b.movie.title}"
             style="width:72px; height:108px; object-fit:cover; border-radius:8px; flex-shrink:0; background:#1a1a2e;"
             onerror="this.onerror=null; this.src='https://image.tmdb.org/t/p/w500/7IiTTgloJzvGI1TAYymCfbfl3vT.jpg';"/>
        <div style="min-width:0;">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px; flex-wrap:wrap;">
          <span th:class="${b.status == 'CONFIRMED'} ? 'status-badge confirmed' : 'status-badge cancelled'"
                th:text="${b.status == 'CONFIRMED'} ? '예매 완료' : '취소됨'"></span>
          <strong th:text="${b.movie.title}" style="color:var(--text-primary);"></strong>
        </div>
        <div style="color:var(--text-muted); font-size:.82rem; line-height:1.8;">
          <p><i class="fa-solid fa-film" style="margin-right:6px;"></i><span th:text="${b.theaterType}"></span></p>
          <p><i class="fa-solid fa-chair" style="margin-right:6px;"></i><span th:text="${b.seatInfo}"></span></p>
          <p><i class="fa-solid fa-users" style="margin-right:6px;"></i>성인 <span th:text="${b.adultCount}"></span>명, 청소년 <span th:text="${b.teenCount}"></span>명</p>
          <p><i class="fa-solid fa-calendar" style="margin-right:6px;"></i><span th:text="${#temporals.format(b.createdAt, 'yyyy-MM-dd HH:mm')}"></span></p>
        </div>
        </div>
      </div>
      <div style="text-align:right;">
        <p style="color:var(--gold); font-size:1.1rem; font-weight:800; margin-bottom:10px;"
           th:text="${#numbers.formatInteger(b.totalPrice,1,'COMMA')} + '원'"></p>
        <form th:if="${b.status == 'CONFIRMED'}"
              th:action="@{/booking/cancel/{id}(id=${b.id})}" method="post"
              onsubmit="return confirm('예매를 취소하시겠습니까?')">
          <th:block th:replace="~{fragments/csrf-field :: csrfField}"></th:block>
          <button type="submit" style="background:none; border:1px solid var(--accent-red); color:var(--accent-red); padding:6px 16px; border-radius:6px; cursor:pointer; font-size:.78rem;">취소</button>
        </form>
      </div>
    </div>
  </div>
</main>
<div th:replace="~{fragments/header :: footer}"></div>
</body>
</html>
