<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('내 리뷰')}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main class="page-mypage" style="padding:50px 0 80px; color:#e8e8f0;">
  <div class="container-xl" style="max-width:860px;">
    <h1 style="font-size:1.6rem; font-weight:900; color:var(--text-primary); margin-bottom:28px;">
      <i class="fa-solid fa-star" style="color:var(--gold); margin-right:10px;"></i>내가 쓴 리뷰
    </h1>

    <!-- 마이페이지 메뉴 탭 -->
    <div style="display:flex; gap:8px; margin-bottom:28px; flex-wrap:wrap;">
      <a th:href="@{/mypage}" style="padding:8px 18px; border-radius:20px; border:1px solid var(--border-color); color:var(--text-muted); text-decoration:none; font-size:.85rem;">마이페이지</a>
      <a th:href="@{/mypage/bookings}" style="padding:8px 18px; border-radius:20px; border:1px solid var(--border-color); color:var(--text-muted); text-decoration:none; font-size:.85rem;">예매내역</a>
      <a th:href="@{/mypage/hearts}" style="padding:8px 18px; border-radius:20px; border:1px solid var(--border-color); color:var(--text-muted); text-decoration:none; font-size:.85rem;">찜한 영화</a>
      <span style="padding:8px 18px; border-radius:20px; background:var(--gold); color:#000; font-size:.85rem; font-weight:700;">내 리뷰</span>
    </div>

    <div style="background:var(--bg-card); border-radius:12px; border:1px solid var(--border-color); padding:48px; text-align:center;">
      <i class="fa-regular fa-star" style="font-size:3rem; color:var(--text-muted); margin-bottom:16px; display:block;"></i>
      <p style="color:var(--text-muted); font-size:1rem; margin-bottom:8px;">아직 작성한 리뷰가 없습니다.</p>
      <p style="color:var(--text-muted); font-size:.85rem; margin-bottom:24px;">영화를 관람하고 리뷰를 남겨보세요!</p>
      <a th:href="@{/movies}" style="display:inline-block; background:var(--gold); color:#000; padding:10px 28px; border-radius:8px; font-weight:700; text-decoration:none;">
        영화 보러 가기
      </a>
    </div>
  </div>
</main>

<div th:replace="~{fragments/header :: footer}"></div>
</body>
</html>
