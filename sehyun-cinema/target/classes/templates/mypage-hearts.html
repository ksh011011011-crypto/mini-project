<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('찜한 영화')}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="page-mypage" style="padding:50px 0 80px; color:#e8e8f0;">
  <div class="container-xl" style="max-width:1100px;">
    <div style="display:flex; align-items:center; gap:16px; margin-bottom:28px;">
      <a th:href="@{/mypage}" style="color:var(--text-muted);"><i class="fa-solid fa-arrow-left"></i></a>
      <h1 style="font-size:1.4rem; font-weight:800; color:var(--text-primary);">
        <i class="fa-solid fa-heart" style="color:#e83c6a; margin-right:8px;"></i>찜한 영화
      </h1>
    </div>

    <div th:if="${movies.empty}" style="text-align:center; padding:60px; color:var(--text-muted);">
      <i class="fa-regular fa-heart" style="font-size:3rem; opacity:.2; display:block; margin-bottom:12px;"></i>
      찜한 영화가 없습니다.
      <div style="margin-top:16px;"><a th:href="@{/movies}" class="btn-hero-primary" style="padding:10px 28px;">영화 둘러보기</a></div>
    </div>

    <div class="movies-grid">
      <div th:each="movie : ${movies}" class="movie-card">
        <a th:href="@{/movies/{id}(id=${movie.id})}" style="text-decoration:none; color:inherit;">
          <div class="movie-poster" th:style="'background:hsl(' + ${movie.id * 37 % 360} + ',35%,22%);'">
            <div class="movie-poster-img-wrap">
              <img th:src="${movie.posterUrlForDisplay != null and !movie.posterUrlForDisplay.isEmpty()} ? ${movie.posterUrlForDisplay} : 'https://placehold.co/300x450/1a1a2e/e4b400?text=NO+POSTER'"
                   th:alt="${movie.title}" class="movie-poster-img" loading="lazy" decoding="async"
                   onerror="this.onerror=null;this.src='https://placehold.co/300x450/1a1a2e/e4b400?text='+encodeURIComponent(this.alt||'영화');"/>
            </div>
          </div>
          <div class="movie-info">
            <p class="movie-title" th:text="${movie.title}"></p>
            <div class="movie-meta">
              <span class="movie-rating"><i class="fa-solid fa-star"></i>
                <span th:text="${#numbers.formatDecimal(movie.ratingAvg != null ? movie.ratingAvg : 0.0, 1, 1)}"></span>
              </span>
              <span style="color:#e83c6a;"><i class="fa-solid fa-heart"></i></span>
            </div>
            <a th:href="@{/booking(movieId=${movie.id})}" class="btn-book" onclick="event.stopPropagation()">예매하기</a>
          </div>
        </a>
      </div>
    </div>
  </div>
</main>
<div th:replace="~{fragments/header :: footer}"></div>
</body>
</html>
