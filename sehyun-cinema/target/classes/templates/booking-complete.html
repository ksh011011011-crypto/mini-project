<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('예매 완료')}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="page-booking-complete" style="min-height:70vh; display:flex; align-items:center; justify-content:center; padding:60px 20px; color:#e8e8f0;">
  <div style="max-width:520px; width:100%; text-align:center;">

    <!-- 완료 아이콘 -->
    <div style="width:90px; height:90px; background:rgba(76,175,80,.12); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; border:2px solid #4caf50; animation: popIn .5s ease;">
      <i class="fa-solid fa-check" style="color:#4caf50; font-size:2.2rem;"></i>
    </div>
    <h1 style="font-size:2rem; font-weight:900; color:var(--text-primary); margin-bottom:6px;">예매 완료!</h1>
    <p style="color:var(--text-muted); margin-bottom:32px; font-size:.9rem;">예매가 성공적으로 완료되었습니다 🎬</p>

    <!-- 예매 상세 카드 -->
    <div style="background:var(--bg-card); border-radius:16px; border:1px solid var(--border-color); padding:28px; text-align:left; margin-bottom:24px;">
      <!-- 영화 포스터 + 제목 헤더 -->
      <div style="display:flex; gap:16px; align-items:center; margin-bottom:20px; padding-bottom:20px; border-bottom:1px solid rgba(255,255,255,.06);">
        <img th:src="${booking.movie.posterUrl != null and !booking.movie.posterUrl.isEmpty()} ? ${booking.movie.posterUrl} : 'https://image.tmdb.org/t/p/w500/7IiTTgloJzvGI1TAYymCfbfl3vT.jpg'"
             th:alt="${booking.movie.title}"
             style="width:64px; height:96px; object-fit:cover; border-radius:8px; flex-shrink:0; background:#1a1a2e;"
             onerror="this.onerror=null; this.src='https://image.tmdb.org/t/p/w500/7IiTTgloJzvGI1TAYymCfbfl3vT.jpg';"/>
        <div>
          <p style="color:var(--gold); font-size:.75rem; font-weight:700; letter-spacing:1px; margin-bottom:4px;">예매 확인</p>
          <h2 style="font-size:1.15rem; font-weight:900; color:var(--text-primary); margin-bottom:4px;" th:text="${booking.movie.title}">영화 제목</h2>
          <span style="background:rgba(228,180,0,.1); color:var(--gold); font-size:.72rem; padding:3px 10px; border-radius:10px;" th:text="${booking.movie.genre}">장르</span>
        </div>
      </div>

      <!-- 상세 정보 -->
      <div style="display:flex; flex-direction:column; gap:12px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span style="color:var(--text-muted); font-size:.85rem;"><i class="fa-solid fa-building" style="width:16px; margin-right:6px;"></i>상영관</span>
          <span th:text="${booking.theaterType}" style="color:var(--text-primary); font-size:.88rem; font-weight:700;"></span>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span style="color:var(--text-muted); font-size:.85rem;"><i class="fa-solid fa-calendar" style="width:16px; margin-right:6px;"></i>상영 일시</span>
          <span th:text="${booking.showtime}" style="color:var(--text-primary); font-size:.88rem;"></span>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span style="color:var(--text-muted); font-size:.85rem;"><i class="fa-solid fa-chair" style="width:16px; margin-right:6px;"></i>좌석</span>
          <span th:text="${booking.seatInfo}" style="color:var(--text-primary); font-size:.88rem; font-weight:700;"></span>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span style="color:var(--text-muted); font-size:.85rem;"><i class="fa-solid fa-users" style="width:16px; margin-right:6px;"></i>인원</span>
          <span th:text="'성인 ' + ${booking.adultCount} + '명' + (${booking.teenCount} > 0 ? ', 청소년 ' + ${booking.teenCount} + '명' : '')"
                style="color:var(--text-primary); font-size:.88rem;"></span>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span style="color:var(--text-muted); font-size:.85rem;"><i class="fa-solid fa-credit-card" style="width:16px; margin-right:6px;"></i>결제 수단</span>
          <span th:text="${booking.paymentMethod}" style="color:var(--text-primary); font-size:.88rem;"></span>
        </div>
        <hr style="border-color:rgba(255,255,255,.07); margin:4px 0;"/>
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span style="color:var(--text-muted); font-size:.9rem; font-weight:700;">총 결제 금액</span>
          <span th:text="${#numbers.formatInteger(booking.totalPrice,1,'COMMA')} + '원'"
                style="color:var(--gold); font-size:1.3rem; font-weight:900;"></span>
        </div>
      </div>
    </div>

    <!-- 예매 번호 -->
    <p style="color:var(--text-muted); font-size:.78rem; margin-bottom:24px;">
      예매번호: <strong th:text="'SC-' + ${booking.id}" style="color:var(--text-primary);"></strong>
    </p>

    <!-- 버튼 -->
    <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
      <a th:href="@{/}" class="btn-hero-secondary" style="padding:12px 28px; border-radius:8px;">홈으로</a>
      <a th:href="@{/mypage/bookings}" class="btn-hero-secondary" style="padding:12px 28px; border-radius:8px;">
        <i class="fa-solid fa-ticket" style="margin-right:6px;"></i>예매 내역
      </a>
      <a th:href="@{/mypage}" class="btn-hero-primary" style="padding:12px 28px; border-radius:8px;">
        <i class="fa-solid fa-user" style="margin-right:6px;"></i>마이페이지
      </a>
    </div>
  </div>
</main>

<style>
@keyframes popIn {
  0%   { transform: scale(0.5); opacity:0; }
  70%  { transform: scale(1.1); }
  100% { transform: scale(1);   opacity:1; }
}
</style>

<div th:replace="~{fragments/header :: footer}"></div>
</body>
</html>
