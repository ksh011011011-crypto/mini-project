<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="movieCards">
  <div th:each="movie : ${movies}" class="movie-card"
       th:data-title="${movie.title}" th:data-id="${movie.id}">
    <a th:href="@{/movies/{id}(id=${movie.id})}" style="text-decoration:none; color:inherit;">
      <div class="movie-poster"
           th:style="'background:hsl(' + ${movie.id * 37 % 360} + ',35%,22%);'">
        <div class="movie-poster-img-wrap">
          <img th:src="${movie.posterUrlForDisplay != null and !movie.posterUrlForDisplay.isEmpty()} ? ${movie.posterUrlForDisplay} : 'https://placehold.co/300x450/1a1a2e/e4b400?text=NO+POSTER'"
               th:alt="${movie.title}" class="movie-poster-img" loading="lazy" decoding="async" fetchpriority="low"
               onerror="this.onerror=null;this.src='https://placehold.co/300x450/1a1a2e/e4b400?text='+encodeURIComponent(this.alt||'영화');"/>
        </div>
        <div th:if="${movie.rankPosition != null}"
             th:class="${movie.rankPosition <= 3} ? 'movie-rank-badge top3' : 'movie-rank-badge'"
             th:text="${movie.rankPosition}"></div>
      </div>
      <div class="movie-info">
        <p class="movie-title" th:text="${movie.title}">영화 제목</p>
        <div class="movie-meta">
          <span class="movie-rating">
            <i class="fa-solid fa-star"></i>
            <span th:text="${#numbers.formatDecimal(movie.ratingAvg != null ? movie.ratingAvg : 0.0, 1, 1)}">8.5</span>
          </span>
          <span th:text="${movie.bookingRate != null ? movie.bookingRate : 0} + '% 예매율'">30%</span>
        </div>
        <a th:href="@{/booking(movieId=${movie.id})}" class="btn-book"
           onclick="event.stopPropagation()">예매하기</a>
      </div>
    </a>
  </div>

  <div th:if="${movies == null or movies.size() == 0}"
       style="grid-column:1/-1; text-align:center; padding:60px; color:var(--text-muted);">
    <i class="fa-solid fa-film" style="font-size:3rem; opacity:.2; display:block; margin-bottom:12px;"></i>
    표시할 영화가 없습니다.
  </div>
</div>
</body>
</html>
