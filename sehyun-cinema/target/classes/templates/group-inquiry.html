<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('단체관람/대관문의')}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main style="padding:50px 0 80px;">
  <div class="container-xl" style="max-width:760px;">
    <h1 style="font-size:1.8rem; font-weight:900; color:var(--text-primary); margin-bottom:8px;">단체관람 / 대관문의</h1>
    <p style="color:var(--text-muted); margin-bottom:28px;">10인 이상 단체 관람 및 대관 서비스를 안내드립니다.</p>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:32px;">
      <div style="background:var(--bg-card); border-radius:12px; border:1px solid var(--border-color); padding:24px;">
        <div style="color:var(--gold); font-size:1.8rem; margin-bottom:12px;"><i class="fa-solid fa-users"></i></div>
        <h3 style="color:var(--text-primary); font-weight:700; margin-bottom:8px;">단체관람</h3>
        <p style="color:var(--text-muted); font-size:.85rem; line-height:1.7;">10인 이상 단체 관람 시 최대 20% 할인 혜택 제공. 사전 예약 필수.</p>
      </div>
      <div style="background:var(--bg-card); border-radius:12px; border:1px solid var(--border-color); padding:24px;">
        <div style="color:var(--gold); font-size:1.8rem; margin-bottom:12px;"><i class="fa-solid fa-building"></i></div>
        <h3 style="color:var(--text-primary); font-weight:700; margin-bottom:8px;">대관</h3>
        <p style="color:var(--text-muted); font-size:.85rem; line-height:1.7;">기업 행사, 프라이빗 상영 등 대관 서비스. 전용 상영관 운영.</p>
      </div>
    </div>

    <div style="background:var(--bg-card); border-radius:16px; border:1px solid var(--border-color); padding:32px;">
      <h3 style="color:var(--gold); font-size:.95rem; margin-bottom:20px; font-weight:700;">문의하기</h3>
      <form th:action="@{/customer/inquiry}" method="post">
        <th:block th:replace="~{fragments/csrf-field :: csrfField}"></th:block>
        <input type="hidden" name="category" value="단체관/대관"/>
        <input type="hidden" name="inquiryType" value="문의"/>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
          <div class="form-group"><label>성명 *</label><input type="text" name="authorName" class="form-input" required/></div>
          <div class="form-group"><label>연락처 *</label><input type="tel" name="phone" class="form-input" required/></div>
          <div class="form-group"><label>이메일 *</label><input type="email" name="email" class="form-input" required/></div>
          <div class="form-group">
            <label>문의 유형</label>
            <select name="title" class="form-input">
              <option>단체관람 문의</option><option>대관 문의</option>
            </select>
          </div>
        </div>
        <div class="form-group" style="margin-top:8px;">
          <label>상세 내용</label>
          <textarea name="content" class="form-input" style="min-height:100px; resize:vertical;" placeholder="희망 인원, 날짜, 목적 등을 기재해 주세요."></textarea>
        </div>
        <button type="submit" class="btn-submit" style="width:auto; padding:12px 36px;">문의 접수</button>
      </form>
    </div>
  </div>
</main>
<div th:replace="~{fragments/header :: footer}"></div>
</body>
</html>
