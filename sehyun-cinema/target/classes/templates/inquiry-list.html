<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('MY 문의내역')}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main style="padding:50px 0 80px;">
  <div class="container-xl" style="max-width:860px;">
    <div style="display:flex; align-items:center; gap:16px; margin-bottom:28px;">
      <a th:href="@{/mypage}" style="color:var(--text-muted);"><i class="fa-solid fa-arrow-left"></i></a>
      <h1 style="font-size:1.4rem; font-weight:800; color:var(--text-primary);">MY 문의내역</h1>
    </div>

    <div th:if="${inquiries.empty}" style="text-align:center; padding:60px; color:var(--text-muted);">
      <i class="fa-regular fa-comments" style="font-size:3rem; opacity:.2; display:block; margin-bottom:12px;"></i>
      문의 내역이 없습니다.
      <div style="margin-top:16px;"><a th:href="@{/customer/inquiry}" class="btn-hero-primary" style="padding:10px 28px;">1:1 문의하기</a></div>
    </div>

    <div th:each="inq : ${inquiries}"
         style="background:var(--bg-card); border-radius:10px; border:1px solid rgba(255,255,255,.06); padding:20px; margin-bottom:10px;">
      <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
        <div style="display:flex; gap:10px; align-items:center;">
          <span th:class="${inq.status == 'ANSWERED'} ? 'status-badge confirmed' : 'status-badge cancelled'"
                th:text="${inq.status == 'ANSWERED'} ? '답변 완료' : '처리 중'"></span>
          <span style="color:var(--text-muted); font-size:.78rem;" th:text="'[' + ${inq.category} + ']'"></span>
        </div>
        <span style="color:var(--text-muted); font-size:.75rem;"
              th:text="${#temporals.format(inq.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
      </div>
      <p style="font-weight:700; color:var(--text-primary); margin-bottom:6px;" th:text="${inq.title}"></p>
      <p style="color:var(--text-muted); font-size:.83rem; line-height:1.6;" th:text="${inq.content}"></p>
      <div th:if="${inq.answerContent != null}"
           style="margin-top:12px; padding:14px; background:rgba(228,180,0,.05); border-radius:8px; border-left:3px solid var(--gold);">
        <p style="font-size:.78rem; color:var(--gold); font-weight:700; margin-bottom:4px;">관리자 답변</p>
        <p style="color:var(--text-light); font-size:.83rem;" th:text="${inq.answerContent}"></p>
      </div>
    </div>
  </div>
</main>
<div th:replace="~{fragments/header :: footer}"></div>
</body>
</html>
