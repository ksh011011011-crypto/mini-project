# ===== 세현 시네마 Application Properties =====
# 기본은 메모리 H2(local) — IDE/gradlew에서 바로 기동. Supabase 쓰면 이 줄 지우고 아래 Postgres 사용.
spring.profiles.active=local
spring.application.name=sehyun-cinema
server.port=8080

# 소셜 로그인: 나중에 연결 시 true (카카오/구글 OAuth2 필터 활성화)
sehyun.oauth2.enabled=false

# ===== Supabase PostgreSQL =====
# PASSWORD 부분을 실제 Supabase 비밀번호로 교체하세요
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres?prepareThreshold=0
spring.datasource.username=postgres.oqzeuxlgvqstztdfsdct
spring.datasource.password=kosmo123!@#
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ===== Thymeleaf =====
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ===== 파일 업로드 =====
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# ===== 세션 =====
server.servlet.session.timeout=30m

# ===== 로그 레벨 =====
logging.level.com.sehyun.cinema=INFO

# ===== TMDB (선택) 포스터 자동 검색 보강 — https://www.themoviedb.org/settings/api
# 비워 두면 기존 제목→URL 맵 + 플레이스홀더만 사용합니다.
tmdb.api.key=

# ===== AI 상담톡 (선택) — 키가 하나도 없으면 규칙·폴백 문구만 사용
# 순서: openai(GPT) → anthropic(Claude) → google(Gemini) 권장. 별칭 gpt, claude, gemini 가능
sehyun.chat.llm.enabled=true
sehyun.chat.order=openai,anthropic,google
sehyun.chat.openai.api-key=
sehyun.chat.openai.model=gpt-4o-mini
sehyun.chat.anthropic.api-key=
sehyun.chat.anthropic.model=claude-3-5-haiku-20241022
sehyun.chat.google.api-key=
sehyun.chat.google.model=gemini-2.0-flash

# ===== 카카오 OAuth2 소셜 로그인 =====
spring.security.oauth2.client.registration.kakao.client-id=ac9e327a05e74da237a8fb3e8cbafeee
spring.security.oauth2.client.registration.kakao.client-secret=
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,profile_image,account_email
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# ===== 구글 OAuth2 소셜 로그인 =====
