<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('영화')}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main style="padding:50px 0 80px;">
  <div class="container-xl">
    <!-- 상태 탭 -->
    <div style="display:flex; gap:8px; margin-bottom:28px;">
      <a th:href="@{/movies(status='SHOWING')}" th:class="${status == 'SHOWING'} ? 'faq-cat-btn active' : 'faq-cat-btn'">현재상영작</a>
      <a th:href="@{/movies(status='UPCOMING')}" th:class="${status == 'UPCOMING'} ? 'faq-cat-btn active' : 'faq-cat-btn'">개봉예정작</a>
      <a th:href="@{/movies(status='ARTE')}" th:class="${status == 'ARTE'} ? 'faq-cat-btn active' : 'faq-cat-btn'">아르떼(Arte)</a>
    </div>

    <div class="movies-grid">
      <div th:each="movie : ${movies.content}" class="movie-card">
        <a th:href="@{/movies/{id}(id=${movie.id})}" style="text-decoration:none; color:inherit;">
          <div class="movie-poster" th:style="'background:hsl(' + ${movie.id * 37 % 360} + ',35%,22%);'">
            <div th:if="${movie.rankPosition != null}"
                 th:class="${movie.rankPosition <= 3} ? 'movie-rank-badge top3' : 'movie-rank-badge'"
                 th:text="${movie.rankPosition}"></div>
            <div class="movie-poster-img-wrap">
              <img th:src="${movie.posterUrlForDisplay != null and !movie.posterUrlForDisplay.isEmpty()} ? ${movie.posterUrlForDisplay} : 'https://placehold.co/300x450/1a1a2e/e4b400?text=NO+POSTER'"
                   th:alt="${movie.title}" class="movie-poster-img" loading="lazy" decoding="async"
                   onerror="this.onerror=null;this.src='https://placehold.co/300x450/1a1a2e/e4b400?text='+encodeURIComponent(this.alt||'영화');"/>
            </div>
          </div>
          <div class="movie-info">
            <p class="movie-title" th:text="${movie.title}"></p>
            <div class="movie-meta">
              <span class="movie-rating"><i class="fa-solid fa-star"></i>
                <span th:text="${#numbers.formatDecimal(movie.ratingAvg != null ? movie.ratingAvg : 0.0, 1, 1)}"></span>
              </span>
              <span th:text="${movie.ageRating}"></span>
            </div>
            <a th:href="@{/booking(movieId=${movie.id})}" class="btn-book" onclick="event.stopPropagation()">예매하기</a>
          </div>
        </a>
      </div>
    </div>

    <!-- 페이지네이션 -->
    <div style="display:flex; justify-content:center; gap:6px; margin-top:32px;">
      <th:block th:each="i : ${#numbers.sequence(0, movies.totalPages - 1)}">
        <a th:href="@{/movies(status=${status},page=${i})}"
           th:class="${i == currentPage} ? 'page-btn active' : 'page-btn'"
           th:text="${i + 1}"></a>
      </th:block>
    </div>
  </div>
</main>
<div th:replace="~{fragments/header :: footer}"></div>
</body>
</html>
