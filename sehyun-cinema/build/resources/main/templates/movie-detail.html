<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head(${movie.title})}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main style="padding:40px 0 80px;">
  <div class="container-xl">

    <!-- 영화 기본 정보 -->
    <div style="display:flex; gap:40px; flex-wrap:wrap; margin-bottom:50px;">
      <!-- 포스터 -->
      <div style="flex-shrink:0; width:260px;">
        <div style="border-radius:12px; overflow:hidden; aspect-ratio:2/3; background:hsl(0,35%,22%);">
          <img th:src="${movie.posterUrlLarge != null and !movie.posterUrlLarge.isEmpty()} ? ${movie.posterUrlLarge} : (${movie.posterUrlForDisplay != null and !movie.posterUrlForDisplay.isEmpty()} ? ${movie.posterUrlForDisplay} : 'https://placehold.co/300x450/1a1a2e/e4b400?text=NO+POSTER')"
               th:alt="${movie.title}"
               style="width:100%; height:100%; object-fit:cover; display:block;"
               loading="eager" decoding="async" fetchpriority="high"
               onerror="this.onerror=null;this.src='https://placehold.co/300x450/1a1a2e/e4b400?text='+encodeURIComponent(this.alt||'영화');"/>
        </div>

        <!-- 하트 버튼 -->
        <button id="heart-btn" th:data-movie-id="${movie.id}"
                th:class="${isHearted} ? 'btn-heart active' : 'btn-heart'"
                style="width:100%; margin-top:12px; padding:10px; border-radius:8px; border:1px solid rgba(255,255,255,.15); background:rgba(255,255,255,.05); color:var(--text-primary); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:all .3s;">
          <i th:class="${isHearted} ? 'fa-solid fa-heart' : 'fa-regular fa-heart'" id="heart-icon"></i>
          <span id="heart-count" th:text="${movie.heartCount}">0</span>
        </button>
      </div>

      <!-- 정보 -->
      <div style="flex:1; min-width:260px;">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
          <span th:if="${movie.rankPosition != null}"
                style="background:var(--gold); color:#000; font-weight:900; font-size:.85rem; padding:4px 12px; border-radius:20px;"
                th:text="'TOP ' + ${movie.rankPosition}">TOP 1</span>
          <span style="background:rgba(255,255,255,.08); color:var(--text-muted); font-size:.75rem; padding:4px 10px; border-radius:10px;"
                th:text="${movie.ageRating}">12세이상</span>
          <span style="background:rgba(228,180,0,.1); color:var(--gold); font-size:.75rem; padding:4px 10px; border-radius:10px;"
                th:text="${movie.genre}">액션</span>
        </div>

        <h1 style="font-size:2rem; font-weight:900; color:var(--text-primary); margin-bottom:12px;"
            th:text="${movie.title}">영화 제목</h1>

        <div style="display:flex; gap:20px; margin-bottom:20px; flex-wrap:wrap;">
          <div style="display:flex; align-items:center; gap:6px; color:var(--gold);">
            <i class="fa-solid fa-star"></i>
            <strong style="font-size:1.4rem;" th:text="${#numbers.formatDecimal(movie.ratingAvg != null ? movie.ratingAvg : 0.0, 1, 1)}">8.5</strong>
            <span style="color:var(--text-muted); font-size:.85rem;">/ 10</span>
          </div>
          <div style="color:var(--text-muted); font-size:.9rem;">
            <i class="fa-solid fa-clock" style="margin-right:4px;"></i>
            <span th:text="${movie.runningTime} + '분'">120분</span>
          </div>
          <div style="color:var(--text-muted); font-size:.9rem;">
            <i class="fa-solid fa-calendar" style="margin-right:4px;"></i>
            <span th:text="${movie.releaseDate}">2024-01-01</span> 개봉
          </div>
        </div>

        <p style="color:var(--text-light); line-height:1.8; margin-bottom:28px;"
           th:text="${movie.description}">영화 설명</p>

        <!-- 예고편 (YouTube embed) -->
        <div th:if="${movie.trailerUrl != null and !#strings.isEmpty(movie.trailerUrl)}"
             style="margin-bottom:24px;">
          <div style="position:relative; padding-bottom:56.25%; border-radius:12px; overflow:hidden; background:#000;">
            <iframe th:src="${movie.trailerUrl}"
                    style="position:absolute; top:0; left:0; width:100%; height:100%; border:0;"
                    title="예고편"
                    loading="lazy"
                    referrerpolicy="strict-origin-when-cross-origin"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen></iframe>
          </div>
        </div>

        <div style="display:flex; gap:12px; flex-wrap:wrap;">
          <a th:href="@{/booking(movieId=${movie.id})}" class="btn-hero-primary" style="border-radius:8px; padding:14px 36px;">
            <i class="fa-solid fa-ticket" style="margin-right:8px;"></i>예매하기
          </a>
          <a th:href="@{/movies}" class="btn-hero-secondary" style="border-radius:8px; padding:14px 24px;">
            목록으로
          </a>
        </div>
      </div>
    </div>

    <!-- 리뷰 섹션 -->
    <section>
      <h2 style="font-size:1.4rem; font-weight:800; color:var(--text-primary); margin-bottom:28px; padding-bottom:16px; border-bottom:1px solid rgba(255,255,255,.08);">
        관람평 <span style="color:var(--gold); font-size:1rem;" th:text="'(' + ${reviews.size()} + '개)'"></span>
      </h2>

      <!-- 리뷰 작성 (로그인, 미작성 시) -->
      <div sec:authorize="isAuthenticated()" th:if="${!alreadyReviewed}"
           style="background:var(--bg-card); border-radius:12px; border:1px solid var(--border-color); padding:24px; margin-bottom:24px;">
        <form th:action="@{/movies/{id}/reviews(id=${movie.id})}" method="post">
          <th:block th:replace="~{fragments/csrf-field :: csrfField}"></th:block>
          <div style="margin-bottom:16px;">
            <label style="display:block; color:var(--text-muted); font-size:.85rem; margin-bottom:8px;">별점</label>
            <div class="star-rating" id="star-rating">
              <span th:each="i : ${#numbers.sequence(1,5)}" class="star" th:data-value="${i}">★</span>
            </div>
            <input type="hidden" name="rating" id="rating-input" value="5"/>
          </div>
          <textarea name="content" class="form-input" style="min-height:80px; resize:vertical;"
                    placeholder="영화 감상을 남겨주세요..." required></textarea>
          <button type="submit" class="btn-submit" style="margin-top:12px; padding:10px 28px; width:auto;">리뷰 등록</button>
        </form>
      </div>

      <div sec:authorize="isAnonymous()"
           style="text-align:center; padding:24px; background:rgba(255,255,255,.03); border-radius:12px; border:1px solid rgba(255,255,255,.06); margin-bottom:24px;">
        <p style="color:var(--text-muted); font-size:.9rem;"><a th:href="@{/login}" style="color:var(--gold);">로그인</a> 후 관람평을 남기실 수 있습니다.</p>
      </div>

      <!-- 리뷰 목록 -->
      <div th:each="review : ${reviews}"
           style="background:var(--bg-card); border-radius:10px; border:1px solid rgba(255,255,255,.06); padding:20px; margin-bottom:12px;">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;">
          <div>
            <span style="font-weight:700; color:var(--text-primary); font-size:.9rem;" th:text="${review.member.name}">이름</span>
            <span style="margin-left:10px; color:var(--gold);">
              <th:block th:each="s : ${#numbers.sequence(1, review.rating)}">★</th:block>
              <th:block th:each="s : ${#numbers.sequence(review.rating + 1, 5)}" style="color:rgba(255,255,255,.2);">★</th:block>
            </span>
          </div>
          <div style="display:flex; align-items:center; gap:12px;">
            <span style="font-size:.75rem; color:var(--text-muted);"
                  th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd')}"></span>
            <form th:if="${currentMember != null and currentMember.username == review.member.username}"
                  th:action="@{/movies/reviews/{id}/delete(id=${review.id})}" method="post" style="display:inline;">
              <th:block th:replace="~{fragments/csrf-field :: csrfField}"></th:block>
              <input type="hidden" name="movieId" th:value="${movie.id}"/>
              <button type="submit" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:.8rem;"
                      onclick="return confirm('리뷰를 삭제하시겠습니까?')">삭제</button>
            </form>
          </div>
        </div>
        <p style="color:var(--text-light); font-size:.9rem; line-height:1.7;" th:text="${review.content}"></p>
      </div>

      <div th:if="${reviews.empty}" style="text-align:center; padding:40px; color:var(--text-muted);">
        <i class="fa-regular fa-comment-dots" style="font-size:2rem; margin-bottom:12px; display:block; opacity:.3;"></i>
        아직 관람평이 없습니다. 첫 번째 리뷰를 남겨보세요!
      </div>
    </section>
  </div>
</main>

<div th:replace="~{fragments/header :: footer}"></div>

<script th:inline="javascript">
/*<![CDATA[*/
// 별점 UI
const stars = document.querySelectorAll('.star');
const ratingInput = document.getElementById('rating-input');
stars.forEach((star, idx) => {
  star.addEventListener('click', () => {
    ratingInput.value = idx + 1;
    stars.forEach((s, i) => {
      s.style.color = i <= idx ? 'var(--gold)' : 'rgba(255,255,255,.2)';
    });
  });
  star.style.cursor = 'pointer';
  star.style.fontSize = '1.6rem';
  star.style.color = idx < 5 ? 'var(--gold)' : 'rgba(255,255,255,.2)';
});

// 하트 토글
const heartBtn = document.getElementById('heart-btn');
if (heartBtn) {
  heartBtn.addEventListener('click', function() {
    const movieId = this.dataset.movieId;
    fetch('/api/movies/' + movieId + '/heart', {
      method: 'POST',
      headers: { 'X-CSRF-TOKEN': document.cookie.match(/XSRF-TOKEN=([^;]+)/)?.[1] || '' }
    })
    .then(r => {
      if (r.status === 401) { location.href = '/login'; return; }
      return r.json();
    })
    .then(data => {
      if (!data) return;
      const icon = document.getElementById('heart-icon');
      document.getElementById('heart-count').textContent = data.heartCount;
      if (data.hearted) {
        icon.className = 'fa-solid fa-heart';
        icon.style.color = '#e83c6a';
      } else {
        icon.className = 'fa-regular fa-heart';
        icon.style.color = '';
      }
    });
  });
}
/*]]>*/
</script>
</body>
</html>
